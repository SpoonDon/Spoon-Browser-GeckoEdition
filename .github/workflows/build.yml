name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------------------------------------------------------
      #  NEW: fix file permissions on the wrapper files
      # ---------------------------------------------------------
      - name: Fix wrapper permissions
        run: |
          chmod +x ./gradlew                               # make script executable
          chmod 644 ./gradle/wrapper/gradle-wrapper.jar    # make JAR readable
      # ---------------------------------------------------------

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeckoViewBrowser-apk
          path: app/build/outputs/apk/release/*.apk
